name: Repair Go Sum

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
        cache: false

    - name: Generate go.sum
      run: go mod tidy

    - name: Commit go.sum
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add go.sum
        git diff --quiet && git diff --staged --quiet || git commit -m "chore: add go.sum"
        git push
